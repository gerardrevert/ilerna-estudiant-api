version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ilerna_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    networks:
      - ilerna_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: ilerna_nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ilerna_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ilerna_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ilerna_estudiants
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: ilerna
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ilerna_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ilerna_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    networks:
      - ilerna_network
    depends_on:
      - db

volumes:
  db_data:

networks:
  ilerna_network:
    driver: bridge
